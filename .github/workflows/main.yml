name: Snyk IaC Scan

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  snyk-iac:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Authenticate Snyk CLI
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      - name: Run Snyk IaC scan (controlled exit codes)
        run: |
          snyk iac test .
          EXIT_CODE=$?

          echo "Snyk exit code: $EXIT_CODE"

          if [ "$EXIT_CODE" -eq 0 ] || [ "$EXIT_CODE" -eq 1 ]; then
            echo "Snyk scan completed (no issues or issues found). Continuing pipeline."
            exit 0
          elif [ "$EXIT_CODE" -eq 2 ] || [ "$EXIT_CODE" -eq 3 ]; then
            echo "Snyk scan failed due to error."
            exit $EXIT_CODE
          else
            echo "Unexpected exit code: $EXIT_CODE"
            exit $EXIT_CODE
          fi

      # Optional: Useful flags for tuning scans
      # - name: Run Snyk IaC scan with options
      #   run: |
      #     snyk iac test . \
      #       --severity-threshold=high \
      #       --org=<your-org-id> \
      #       --json \
      #       --json-file-output=snyk-iac.json \
      #       --detection-depth=4 \
      #       --target-reference=main

      # Optional: send IaC results to Snyk Web UI
